<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
    <title>捡石子小游戏</title>
    <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Ctext x='50%25' y='52%25' dominant-baseline='middle' text-anchor='middle' font-size='42'%3E%F0%9F%AA%A8%3C/text%3E%3C/svg%3E">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <main class="app-shell">
        <section class="app">
            <header class="topbar">
                <div class="title-group">
                    <p class="eyebrow" data-i18n="eyebrow"></p>
                    <div class="title-row">
                        <h1 data-i18n="title"></h1>
                        <div class="lang-switch" aria-label="Language switch" role="group">
                            <button type="button" class="lang-btn" data-lang="zh-CN">中</button>
                            <button type="button" class="lang-btn" data-lang="en">EN</button>
                        </div>
                    </div>
                    <p class="subtitle" data-i18n="subtitle"></p>
                </div>
            </header>

            <section class="screen setup-screen" id="setupScreen">
                <section class="hero-strip">
                    <div class="hero-copy">
                        <div class="hero-chip" data-i18n="ruleBanner"></div>
                    </div>
                    <div class="hero-stats">
                        <div class="hero-stat">
                            <span class="hero-stat-label" data-i18n="maxPickLabel"></span>
                            <strong>1-3</strong>
                        </div>
                        <div class="hero-stat">
                            <span class="hero-stat-label" data-i18n="repeatRuleLabel"></span>
                            <strong data-i18n="repeatRuleValue"></strong>
                        </div>
                    </div>
                </section>

                <section class="setup-grid">
                    <section class="panel setup-panel">
                        <div class="panel-header">
                            <div>
                                <h2 data-i18n="setupTitle"></h2>
                                <p data-i18n="setupHint"></p>
                            </div>
                        </div>

                        <div class="form-grid">
                            <label class="field">
                                <span data-i18n="modeLabel"></span>
                                <select id="modeSelect">
                                    <option value="ai"></option>
                                    <option value="pvp"></option>
                                </select>
                            </label>

                            <label class="field">
                                <span data-i18n="totalLabel"></span>
                                <input type="number" id="totalStones" min="6" max="99" value="16">
                            </label>

                            <label class="field">
                                <span data-i18n="player1Label"></span>
                                <input type="text" id="player1">
                            </label>

                            <label class="field">
                                <span id="player2LabelText"></span>
                                <input type="text" id="player2">
                            </label>
                        </div>

                        <div class="panel-actions">
                            <button type="button" class="primary-btn" id="startButton"></button>
                        </div>
                    </section>

                    <section class="panel rules-panel">
                        <div class="panel-header">
                            <div>
                                <h2 data-i18n="rulesTitle"></h2>
                                <p data-i18n="rulesHint"></p>
                            </div>
                        </div>

                        <ul class="rules-list" id="rulesList"></ul>
                    </section>
                </section>
            </section>

            <section class="screen game-screen is-hidden" id="gameScreen">
                <section class="panel game-panel" id="gamePanel">
                    <div class="game-topbar">
                        <div class="status-cluster">
                            <div class="status-pill" id="status"></div>
                            <div class="turn-copy" id="turnHint"></div>
                        </div>
                    </div>

                    <div class="game-summary">
                        <div class="summary-chip">
                            <span class="summary-label" data-i18n="remainingLabel"></span>
                            <strong id="remainingCount">0</strong>
                        </div>
                        <div class="summary-chip">
                            <span class="summary-label" data-i18n="lastPickLabel"></span>
                            <strong id="lastPickValue"></strong>
                        </div>
                    </div>

                    <div class="duel-strip">
                        <article class="player-card" id="playerCard0">
                            <div class="player-avatar" id="avatar0" aria-hidden="true">🧑</div>
                            <div class="player-meta">
                                <div class="player-name" id="playerName0"></div>
                                <div class="player-role" id="playerRole0"></div>
                            </div>
                        </article>

                        <div class="duel-mark" aria-hidden="true">VS</div>

                        <article class="player-card" id="playerCard1">
                            <div class="player-avatar" id="avatar1" aria-hidden="true">🤖</div>
                            <div class="player-meta">
                                <div class="player-name" id="playerName1"></div>
                                <div class="player-role" id="playerRole1"></div>
                            </div>
                        </article>
                    </div>

                    <section class="board">
                        <div class="board-head">
                            <div class="board-title" data-i18n="boardTitle"></div>
                        </div>

                        <div class="stones-stage" id="stonesStage">
                            <div class="stones-grid" id="stonesGrid"></div>
                            <div class="stone-overlay" id="stoneOverlay"></div>
                        </div>

                        <div class="action-strip">
                            <div class="action-label" data-i18n="actionsLabel"></div>
                            <div class="actions" id="actions"></div>
                        </div>
                    </section>

                    <details class="log-section">
                        <summary class="log-head">
                            <span class="log-title" data-i18n="logTitle"></span>
                            <span class="log-meta">
                                <span class="log-counter" id="logCounter"></span>
                                <span class="log-hint" id="logHint"></span>
                            </span>
                        </summary>
                        <div class="log-list" id="logList" aria-live="polite"></div>
                    </details>

                    <div class="panel-actions">
                        <button type="button" class="primary-btn" id="newRoundButton"></button>
                        <button type="button" class="secondary-btn" id="backButton"></button>
                    </div>
                </section>

                <div class="result-modal is-hidden" id="resultModal" role="dialog" aria-modal="true" aria-labelledby="resultModalTitle">
                    <div class="result-modal-card">
                        <div class="result-modal-kicker" data-i18n="resultLabel"></div>
                        <h2 class="result-modal-title" id="resultModalTitle"></h2>
                        <p class="result-modal-copy" id="resultModalCopy"></p>
                        <div class="panel-actions result-modal-actions">
                            <button type="button" class="primary-btn" id="modalNewRoundButton"></button>
                            <button type="button" class="secondary-btn" id="modalCloseButton"></button>
                            <button type="button" class="secondary-btn" id="modalBackButton"></button>
                        </div>
                    </div>
                </div>
            </section>
        </section>
    </main>

    <script src="app.js"></script>
</body>
</html>
